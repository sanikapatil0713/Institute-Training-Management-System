{% extends "admin_base.html" %}

{% block title %}Course Management{% endblock %}

{% block content %}
<h2 class="text-center mb-4">📚 Course Management</h2>

<div class="card shadow p-4 mb-4">
    <h5>Add Course</h5>
    <form method="POST" action="{{ url_for('admin.add_course') }}">
        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="text" name="course_name" class="form-control" placeholder="Course Name" required>
            </div>
            <div class="col-md-6 mb-3">
                <input type="text" name="duration" class="form-control" placeholder="Duration (e.g., 3 Months)" required>
            </div>
        </div>
        <button class="btn btn-primary px-4">Add Course</button>
    </form>
</div>

<div class="card shadow p-4">
    <h5>📋 All Courses</h5>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Duration</th>
                <th style="width: 120px;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for c in courses %}
            <tr>
                <td>{{ c.course_id }}</td>
                <td>{{ c.course_name }}</td>
                <td>{{ c.duration }}</td>
                <td>
                    <a href="{{ url_for('admin.delete_course', course_id=c.course_id) }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this course?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
