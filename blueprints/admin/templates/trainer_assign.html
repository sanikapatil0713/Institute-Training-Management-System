{% extends 'admin_base.html' %}
{% block content %}

<div class="container mt-4">
    <h2 class="text-center mb-4">👨‍🏫 Assign Trainer to Course & Subject</h2>

    <!-- Assignment Form -->
    <div class="card shadow p-3 mb-4">
        <h5 class="mb-3">Add Assignment</h5>
        <form method="POST" action="{{ url_for('admin.trainer_assign') }}">
            <div class="row">
                <!-- Trainer -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Trainer</label>
                    <select name="trainer_id" class="form-control" required>
                        <option value="">Select Trainer</option>
                        {% for t in trainers %}
                        <option value="{{ t.id }}">{{ t.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Course -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Course</label>
                    <select name="course_id" id="courseSelect" class="form-control" required>
                        <option value="">Select Course</option>
                        {% for c in courses %}
                        <option value="{{ c.course_id }}">{{ c.course_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Subject -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Subject</label>
                    <select name="subject_id" id="subjectSelect" class="form-control" required>
                        <option value="">Select Subject</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary px-4">Assign Trainer</button>
        </form>
    </div>


    

    <!-- All Assignments Table -->
    <div class="card shadow p-3">
        <h5 class="mb-3">📋 All Assignments</h5>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Trainer</th>
                    <th>Course</th>
                    <th>Subject</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for a in assignments %}
                <tr>
                    <td>{{ a.trainer_name }}</td>
                    <td>{{ a.course_name }}</td>
                    <td>{{ a.subject_name }}</td>
                    <td>
                        <a href="{{ url_for('admin.delete_trainer_assign', assign_id=a.id) }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this assignment?')">
                           Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    // Load Subjects dynamically when course changes
    $("#courseSelect").change(function () {
        let courseId = $(this).val();
        $("#subjectSelect").html("<option>Loading...</option>");

        if(courseId){
            $.get(`/admin/get_subjects_by_course/${courseId}`, function(data){
                let options = "<option value=''>Select Subject</option>";
                data.forEach(function(s){
                    options += `<option value="${s.subject_id}">${s.subject_name}</option>`;
                });
                $("#subjectSelect").html(options);
            });
        } else {
            $("#subjectSelect").html("<option value=''>Select Subject</option>");
        }
    });
</script>

{% endblock %}
